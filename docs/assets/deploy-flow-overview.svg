<svg xmlns="http://www.w3.org/2000/svg" width="920" height="300" viewBox="0 0 920 300">
  <rect width="920" height="300" rx="8" fill="#1e1e1e"/>

  <text x="52" y="30" fill="#e8e8e8" font-family="Consolas, monospace" font-size="13" font-weight="700">LOCAL</text>
  <line x1="24" y1="36" x2="170" y2="36" stroke="#3c3c3c"/>
  <text x="248" y="30" fill="#e8e8e8" font-family="Consolas, monospace" font-size="13" font-weight="700">GITHUB</text>
  <line x1="220" y1="36" x2="360" y2="36" stroke="#3c3c3c"/>
  <text x="418" y="30" fill="#e8e8e8" font-family="Consolas, monospace" font-size="13" font-weight="700">STAGING</text>
  <line x1="390" y1="36" x2="560" y2="36" stroke="#3c3c3c"/>
  <text x="642" y="30" fill="#e8e8e8" font-family="Consolas, monospace" font-size="13" font-weight="700">PRODUCTION</text>
  <line x1="620" y1="36" x2="860" y2="36" stroke="#3c3c3c"/>

  <text x="24" y="58" fill="#858585" font-family="Consolas, monospace" font-size="11">Phase 1 ? RC / staging</text>
  <text x="24" y="84" fill="#d4d4d4" font-family="Consolas, monospace" font-size="12">git commit</text>
  <text x="24" y="102" fill="#d4d4d4" font-family="Consolas, monospace" font-size="12">git tag vX.Y.Z-rc.N</text>
  <text x="24" y="120" fill="#d4d4d4" font-family="Consolas, monospace" font-size="12">git push tag</text>

  <line x1="175" y1="110" x2="215" y2="110" stroke="#569cd6" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="220" y="102" fill="#d4d4d4" font-family="Consolas, monospace" font-size="12">tag on release</text>
  <text x="220" y="120" fill="#d4d4d4" font-family="Consolas, monospace" font-size="12">push tag</text>

  <line x1="365" y1="110" x2="395" y2="110" stroke="#569cd6" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="400" y="84" fill="#d4d4d4" font-family="Consolas, monospace" font-size="12">checkout rc.N</text>
  <text x="400" y="102" fill="#d4d4d4" font-family="Consolas, monospace" font-size="12">npm test</text>
  <text x="400" y="120" fill="#d4d4d4" font-family="Consolas, monospace" font-size="12">smoke / tunnel</text>
  <text x="400" y="148" fill="#dcdcaa" font-family="Consolas, monospace" font-size="12">Approve</text>
  <line x1="408" y1="132" x2="408" y2="140" stroke="#858585"/>
  <polygon points="404,140 412,140 408,148" fill="#858585"/>

  <text x="24" y="188" fill="#858585" font-family="Consolas, monospace" font-size="11">Phase 2 ? Production</text>
  <text x="24" y="214" fill="#d4d4d4" font-family="Consolas, monospace" font-size="12">ship workflow</text>
  <text x="24" y="232" fill="#d4d4d4" font-family="Consolas, monospace" font-size="12">merge to release</text>
  <text x="24" y="250" fill="#d4d4d4" font-family="Consolas, monospace" font-size="12">PR release to main</text>

  <line x1="175" y1="232" x2="215" y2="232" stroke="#569cd6" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="220" y="214" fill="#d4d4d4" font-family="Consolas, monospace" font-size="12">code-reviewer</text>
  <text x="220" y="232" fill="#d4d4d4" font-family="Consolas, monospace" font-size="12">merge PR</text>
  <text x="220" y="250" fill="#d4d4d4" font-family="Consolas, monospace" font-size="12">tag vX.Y.Z</text>

  <line x1="365" y1="232" x2="615" y2="232" stroke="#569cd6" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="630" y="214" fill="#d4d4d4" font-family="Consolas, monospace" font-size="12">checkout main</text>
  <text x="630" y="232" fill="#d4d4d4" font-family="Consolas, monospace" font-size="12">deploy prod</text>
  <text x="630" y="250" fill="#d4d4d4" font-family="Consolas, monospace" font-size="12">health check</text>

  <rect x="24" y="268" width="872" height="24" rx="4" fill="#2d2d2d" stroke="#3c3c3c"/>
  <text x="36" y="284" fill="#858585" font-family="Consolas, monospace" font-size="11">devD / devH / devB  -&gt;  release  -&gt;  main (PR only)</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#569cd6"/>
    </marker>
  </defs>
</svg>
